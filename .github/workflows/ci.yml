# CI workflow for Alurtmee.
#
# Scope decision R2b: Linux-only v1. CI runs on ubuntu only for now, but the job
# uses strategy.matrix.os so adding macOS/Windows later is a trivial, additive
# change (extend the matrix list; the Linux-specific apt step is already gated
# with `if: runner.os == 'Linux'` so future matrix entries skip it cleanly).
name: CI

on:
  push:
  pull_request:

jobs:
  ci:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system deps (Iced + headless GL + xvfb)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxkbcommon-dev \
            libwayland-dev \
            libxkbcommon-x11-dev \
            libx11-dev \
            libgl1-mesa-dev \
            mesa-vulkan-drivers \
            libdbus-1-dev \
            xvfb \
            gnome-keyring \
            dbus-x11

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt, llvm-tools-preview

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Build
        run: cargo build --workspace --all-targets

      # Phase 1 introduces a live OS-keychain test (store::Keychain against the Secret Service).
      # Headless CI has no keyring, so we start a private D-Bus session and an unlocked
      # gnome-keyring `secrets` component for the test run (MASTER B3 / PHASE-1 §2 env gate).
      - name: Test
        run: |
          dbus-run-session -- bash -c '
            echo "ci-keyring-pass" | gnome-keyring-daemon --unlock --components=secrets
            cargo test --workspace'

      - name: Headless window smoke
        env:
          LIBGL_ALWAYS_SOFTWARE: "1"
        run: |
          xvfb-run -a --server-args="-screen 0 1280x800x24" bash -c '
            cargo build -p app --bin alurtmee
            target/debug/alurtmee & APP_PID=$!
            sleep 4
            if kill -0 "$APP_PID" 2>/dev/null; then echo "window smoke: app alive after 4s — PASS"; kill "$APP_PID"; exit 0; else wait "$APP_PID"; echo "window smoke: app exited early — FAIL"; exit 1; fi'

      - name: Coverage (informational)
        continue-on-error: true
        run: |
          dbus-run-session -- bash -c '
            echo "ci-keyring-pass" | gnome-keyring-daemon --unlock --components=secrets
            cargo llvm-cov --workspace --summary-only'
