# Publish a release when a release-labelled PR is merged.
#
# `version-bump.yml` already bumped the VERSION file on the PR branch, so by the time the PR merges,
# `main` holds the new version. This job reads it, builds a release binary, packages a `.deb` and an
# AppImage, writes SHA256SUMS, attaches a signed build-provenance attestation, and publishes a
# GitHub Release with the `vX.Y.Z` tag — created by CI, so you never run `git tag`.
#
# Nothing here pushes to `main`, so it is fully compatible with branch protection.
name: release

on:
  pull_request:
    types: [closed]
  # Manual re-release: rebuild and publish the version currently on the dispatched
  # ref (default: main's VERSION) without a labelled PR — e.g. to redo a release.
  workflow_dispatch: {}

permissions:
  contents: write # create the release + tag
  id-token: write # OIDC token for provenance attestation
  attestations: write # write the attestation

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  release:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true && (
      contains(github.event.pull_request.labels.*.name, 'release') ||
      contains(github.event.pull_request.labels.*.name, 'release:major') ||
      contains(github.event.pull_request.labels.*.name, 'release:patch')))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the merge commit
        uses: actions/checkout@v4
        with:
          # PR-merge event: the merge commit. Manual dispatch: the dispatched ref's HEAD.
          ref: ${{ github.event.pull_request.merge_commit_sha || github.sha }}
          fetch-depth: 0

      - name: Read version
        run: |
          v="$(cat VERSION)"
          echo "VERSION=$v" >> "$GITHUB_ENV"
          echo "Publishing v$v"

      - name: Install system deps (Iced build + packaging)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxkbcommon-dev libwayland-dev libxkbcommon-x11-dev libx11-dev \
            libgl1-mesa-dev mesa-vulkan-drivers libdbus-1-dev gnome-keyring dbus-x11 file

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release -p app --bin alurtmee

      - name: Package .deb
        run: |
          cargo install cargo-deb --locked
          cargo deb -p app --no-build
          mkdir -p dist && cp target/debian/*.deb dist/

      - name: Package AppImage
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"
          OUTPUT: "Alurtmee-${{ env.VERSION }}-x86_64.AppImage"
        run: |
          cp assets/logo-128.png alurtmee.png
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage
          ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --executable target/release/alurtmee \
            --desktop-file packaging/alurtmee.desktop \
            --icon-file alurtmee.png \
            --output appimage
          # Move ONLY the built app image (named via $OUTPUT). A bare ./*.AppImage glob
          # would also sweep in linuxdeploy-x86_64.AppImage, the packaging tool downloaded
          # above, leaking it into the release and SHA256SUMS.
          mv "$OUTPUT" dist/

      - name: Generate SHA256SUMS
        run: |
          cd dist
          sha256sum ./*.AppImage ./*.deb > SHA256SUMS
          cat SHA256SUMS

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: |
            dist/*.AppImage
            dist/*.deb

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: v${{ env.VERSION }}
          target_commitish: ${{ github.event.pull_request.merge_commit_sha || github.sha }}
          files: |
            dist/*.AppImage
            dist/*.deb
            dist/SHA256SUMS
          generate_release_notes: true
